name: Release

# Publish to PyPI when a vX.Y.Z tag is pushed, then run the post-publish
# chores: create the GitHub Release from RELEASE_NOTES_vX.Y.Z.md and open
# the Homebrew formula bump PR.
#
# Authentication for PyPI is via Trusted Publishing (OIDC) -- no long-lived
# API tokens stored in GitHub Secrets. The one-time PyPI-side configuration
# lives in PyPI > Manage > bourdon > Publishing; see docs/RELEASE_PROCESS.md
# for the exact fields. The `environment: pypi` line below MUST match the
# environment name PyPI was told to expect.
#
# Tag-push triggers the workflow automatically; `workflow_dispatch` also
# accepts an optional `tag` input so a release can be (re)published
# retroactively without re-tagging. Re-runs are idempotent: the GitHub
# Release is updated rather than re-created, and the Homebrew bump branch
# is skipped if it already exists on origin.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to publish (e.g. v0.7.0). Defaults to current ref.'
        required: false
        type: string

permissions:
  contents: read

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - name: Check out tag
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tools
        run: python -m pip install --upgrade build

      - name: Build distributions
        run: python -m build

      - name: Verify built version matches tag
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          EXPECTED="${TAG#v}"
          BUILT=$(ls dist/bourdon-*.tar.gz | sed -E 's|.*/bourdon-(.+)\.tar\.gz|\1|')
          echo "Tag version:   $EXPECTED"
          echo "Built version: $BUILT"
          test "$BUILT" = "$EXPECTED"

      - name: Upload artifacts for the publish job
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest

    # Trusted Publishing requires this environment name to match the
    # one configured on the PyPI side under Manage > Publishing.
    environment:
      name: pypi
      url: https://pypi.org/project/bourdon/

    # OIDC: required for Trusted Publishing handshake.
    permissions:
      id-token: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI via OIDC
        uses: pypa/gh-action-pypi-publish@release/v1

  github_release:
    name: Create GitHub Release
    needs: publish
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Check out tag
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Create or update GitHub Release from RELEASE_NOTES file
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          NOTES="RELEASE_NOTES_${TAG}.md"
          if [ ! -f "$NOTES" ]; then
            echo "::error::Missing $NOTES at tag $TAG. Release notes must land on main before the tag is cut."
            exit 1
          fi
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists -- updating notes from $NOTES."
            gh release edit "$TAG" --notes-file "$NOTES"
          else
            echo "Creating release $TAG from $NOTES."
            gh release create "$TAG" --title "$TAG" --notes-file "$NOTES"
          fi

  homebrew_bump:
    name: Open Homebrew formula bump PR
    needs: publish
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Compute new tarball SHA256
        id: sha
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          URL="https://github.com/getbourdon/bourdon/archive/refs/tags/${TAG}.tar.gz"
          SHA=$(curl -sL "$URL" | shasum -a 256 | awk '{print $1}')
          if [ -z "$SHA" ] || [ "${#SHA}" -ne 64 ]; then
            echo "::error::Failed to compute sha256 of $URL"
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "sha=$SHA"  >> "$GITHUB_OUTPUT"

      - name: Patch Formula/bourdon.rb
        run: |
          TAG="${{ steps.sha.outputs.tag }}"
          URL="${{ steps.sha.outputs.url }}"
          SHA="${{ steps.sha.outputs.sha }}"
          python - <<PY
          import pathlib, re
          p = pathlib.Path("Formula/bourdon.rb")
          src = p.read_text()
          src = re.sub(r'^(\s*url\s+")[^"]+(")', r'\g<1>${URL}\g<2>', src, count=1, flags=re.MULTILINE)
          src = re.sub(r'^(\s*sha256\s+")[^"]+(")', r'\g<1>${SHA}\g<2>', src, count=1, flags=re.MULTILINE)
          p.write_text(src)
          PY
          git diff -- Formula/bourdon.rb

      - name: Open bump PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.sha.outputs.tag }}"
          BRANCH="chore/homebrew-bump-${TAG}"
          PR_URL="https://github.com/getbourdon/bourdon/pull/new/${BRANCH}"
          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            echo "Branch $BRANCH already exists on origin -- skipping. Close or re-run after deleting the stale PR."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add Formula/bourdon.rb
          git commit -m "chore(homebrew): bump Formula to ${TAG}"
          git push origin "$BRANCH"
          set +e
          PR_CREATE_OUTPUT=$(gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "chore(homebrew): bump Formula to ${TAG}" \
            --body "Auto-generated by \`release.yml\` after \`${TAG}\` published to PyPI. Bumps \`url\` to the new tag tarball and recomputes \`sha256\`." \
            2>&1)
          PR_CREATE_STATUS=$?
          set -e
          if [ "$PR_CREATE_STATUS" -ne 0 ]; then
            if echo "$PR_CREATE_OUTPUT" | grep -q "GitHub Actions is not permitted to create or approve pull requests"; then
              echo "::warning::${PR_CREATE_OUTPUT}"
              echo "::notice::Branch ${BRANCH} was pushed. Open the PR manually: ${PR_URL}"
              exit 0
            fi
            echo "$PR_CREATE_OUTPUT"
            exit "$PR_CREATE_STATUS"
          fi
          echo "$PR_CREATE_OUTPUT"
